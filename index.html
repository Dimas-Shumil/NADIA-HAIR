<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="site/css/main.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header" data-header>
      <div class="header__inner glass">
        <nav class="header__nav header__nav--left" aria-label="Левая навигация">
          <a href="#home">Главная</a>
          <a href="#services">Услуги</a>
        </nav>

        <a href="#home" class="header__logo" aria-label="На главную">
          <img src="site/img/logo.png" alt="Nadia Hair Studio" />
        </a>

        <nav
          class="header__nav header__nav--right"
          aria-label="Правая навигация"
        >
          <a href="#works">Работы</a>
          <a href="#contact">Контакты</a>
        </nav>

        <button
          class="header__burger"
          type="button"
          aria-label="Открыть меню"
          aria-expanded="false"
          data-burger
        >
          <span></span>
          <span></span>
        </button>
      </div>

      <nav
        class="header__mobile"
        aria-label="Мобильная навигация"
        data-mobile-menu
      >
        <div class="header__mobile-nav">
          <a href="#home">Главная</a>
          <a href="#services">Услуги</a>
          <a href="#works">Работы</a>
          <a href="#about">О салоне</a>
          <a href="#contact">Контакты</a>
        </div>

        <div class="header__mobile-contact">
          <span>Записаться в салон</span>
          <a href="tel:89233906649">8 923 390-66-49</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <span>красота в каждой детали</span>

        <h1>
          «Премиальный цвет и уход за волосами — персонально для вас.»
          <br />
          Надежда Шумилова
        </h1>
      </section>

      <!-- section two -->

      <div class="beauty-flow" data-beauty-flow>
        <!-- Секция два: визуальная лента направлений -->
        <section class="section-two" aria-label="Направления салона">
          <div class="section-two__marquee" data-section-two-marquee>
            <div class="section-two__track" data-section-two-track>
              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="Окрашивание волос"
                />
                <span>COLOR</span>
              </a>

              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="AirTouch окрашивание"
                />
                <span>AIRTOUCH</span>
              </a>

              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="Уход за волосами"
                />
                <span>CARE</span>
              </a>

              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="Стрижки волос"
                />
                <span>CUT</span>
              </a>

              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="Укладки волос"
                />
                <span>STYLE</span>
              </a>

              <a class="section-two__card" href="#services">
                <img
                  src="site/img/photo_2026-05-11_08-58-23.jpg"
                  alt="Восстановление волос"
                />
                <span>RESTORE</span>
              </a>
            </div>
          </div>
        </section>

        <!-- Секция три: светлая имиджевая сцена -->
        <section class="section-three" aria-labelledby="section-three-title">
          <div
            class="section-three__decor section-three__decor--one"
            aria-hidden="true"
          >
            <img src="site/img/IMG_4749.PNG" alt="" />
          </div>

          <div
            class="section-three__decor section-three__decor--two"
            aria-hidden="true"
          >
            <img src="site/img//IMG_4750.PNG" alt="" />
          </div>

          <div
            class="section-three__decor section-three__decor--three"
            aria-hidden="true"
          >
            <img src="site/img/IMG_4749.PNG" alt="" />
          </div>

          <div
            class="section-three__decor section-three__decor--four"
            aria-hidden="true"
          >
            <img src="site/img/IMG_4749.PNG" alt="" />
          </div>

          <div
            class="section-three__decor section-three__decor--five"
            aria-hidden="true"
          >
            <img src="site/img/IMG_4749.PNG" alt="" />
          </div>

          <div
            class="section-three__decor section-three__decor--six"
            aria-hidden="true"
          >
            <img src="site/img/IMG_4749.PNG" alt="" />
          </div>

          <div class="section-three__content">
            <h2 class="section-three__title" id="section-three-title">
              THE ART OF<br />
              UNDERSTATED<br />
              BEAUTY
            </h2>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="site/script/main.js"></script>
  </body>
</html>
